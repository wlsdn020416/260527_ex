<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM CRUD</title>
</head>
<body>
    <h1>DOM CRUD</h1>
    <!-- 읽는 행위를 먼저 함 -->
     <p class="desert">버터떡</p>
     <p class="desert" id ="dzk">두쫀쿠</p>
     <div>
        <p>봄동 비빔밥</p>
     </div>
     <div id="container">
        <form id="form">
            <input id="text">
            <button>등록</button>
        </form>
        <div id="list">

        </div>
     </div>
    <script>
        //dom제어의 목적 -> body 맨끝에 위치
        //HTML 영역과 javascript영역 구분을 위해
        // console.log("Hello DOM")
        const p1 = document.querySelector("p");
        //선택자를 기반으로 해서 dom 트리 기준으로 가장 먼저 검색되는 태그
        console.log(p1);
        const p2 = document.querySelectorAll("p");
        console.log(...p2);
        const p3 = document.querySelector("#dzk");
        console.log(p3);
        const p4 = document.querySelectorAll(".desert");
        console.log(...p4);
        // ---------------------------------------------
        const form = document.querySelector('#form');
        console.log(form);
        form.addEventListener("submit",(evt)=>{
            evt.preventDefault();//기본이벤트 방지
            const list = document.querySelector('#list');
            console.log(list);
            const p = document.createElement("p");
            const text = document.querySelector("#text");
            p.textContent = text.value;
            list.append(p);
        })
    </script>
</body>
</html>
